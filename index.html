<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Test | AditzMods</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }
        .glow:hover {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-100">

    <div class="max-w-md w-full bg-slate-900/40 backdrop-blur-md p-8 rounded-3xl border border-slate-800 text-center transition-all duration-300 glow">
        <div class="mx-auto w-20 h-20 bg-gradient-to-tr from-cyan-500 to-indigo-500 rounded-2xl flex items-center justify-center shadow-lg shadow-cyan-500/20 mb-6 rotate-3 hover:rotate-0 transition-transform duration-300">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
        </div>

        <h1 class="text-3xl font-black tracking-tight mb-2 bg-gradient-to-r from-cyan-400 to-indigo-300 bg-clip-text text-transparent">
            Deployment Live!
        </h1>
        <p class="text-slate-400 text-sm mb-6">
            If you can see this page, your automated launcher successfully pushed the code to GitHub and mapped the domain perfectly on Vercel.
        </p>

        <div class="grid grid-cols-2 gap-3 mb-6 text-left">
            <div class="bg-slate-950/60 p-3 rounded-xl border border-slate-800/80">
                <div class="text-xs text-slate-500 font-semibold uppercase">Status</div>
                <div class="text-emerald-400 font-bold text-sm flex items-center gap-1.5 mt-0.5">
                    <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span> Active
                </div>
            </div>
            <div class="bg-slate-950/60 p-3 rounded-xl border border-slate-800/80">
                <div class="text-xs text-slate-500 font-semibold uppercase">Framework</div>
                <div class="text-cyan-400 font-bold text-sm mt-0.5">Pure HTML</div>
            </div>
        </div>

        <div class="text-xs text-slate-500 font-mono">
            Powered by aditzmods.my.id
        </div>
    </div>

</body>
</html>
